<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广西特色器物几何分析合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
body{background:#f5f5f5;padding:20px}
.container{max-width:800px;margin:0 auto;background:#fff;padding:30px;border-radius:12px}
h1{text-align:center;margin-bottom:30px}
.menu{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-bottom:30px}
.menu button{padding:15px;border:none;border-radius:8px;background:#eee;font-size:16px;cursor:pointer}
.page{display:none;margin-bottom:30px}
.page.active{display:block}
.back{margin-bottom:20px}
.back button{padding:8px 16px;border:none;border-radius:8px;background:#333;color:#fff;cursor:pointer}
h2{margin:15px 0}
p{line-height:1.7;margin:10px 0}
.geo{background:#f9f9f9;padding:15px;border-radius:8px;margin:10px 0}
</style>
</head>
<body>

<div class="container">
  <h1>广西特色器物几何分析</h1>

  <div class="menu">
    <button onclick="show('tonggu')">铜鼓</button>
    <button onclick="show('xiuqiu')">绣球</button>
    <button onclick="show('bridge')">风雨桥</button>
  </div>

  <!-- 铜鼓 -->
  <div class="page" id="tonggu">
    <div class="back"><button onclick="back()">返回</button></div>
    <h1>明代游旗纹铜鼓</h1>
    <h2>一、基础几何体</h2>
    <div class="geo">圆柱体、圆形、圆环、射线三角形、长方体棱柱</div>
    <h2>二、几何与文化意义</h2>
    <p>铜鼓是广西少数民族文化符号，以圆柱体为主体，鼓面同心圆与射线体现对称美学，象征太阳与天地崇拜，是实用与信仰的结合。</p>
  </div>

  <!-- 绣球 -->
  <div class="page" id="xiuqiu">
    <div class="back"><button onclick="back()">返回</button></div>
    <h1>壮族绣球</h1>
    <h2>一、基础几何体</h2>
    <div class="geo">球体、圆柱体、小球体、多边形面</div>
    <h2>二、几何与文化意义</h2>
    <p>绣球以对称球体为核心，代表平安吉祥，是壮族民俗与几何美学的完美结合。</p>
  </div>

  <!-- 风雨桥 -->
  <div class="page" id="bridge">
    <div class="back"><button onclick="back()">返回</button></div>
    <h1>三江风雨桥</h1>
    <h2>一、基础几何体</h2>
    <div class="geo">长方体、棱锥、圆柱体、球体</div>
    <h2>二、几何与文化意义</h2>
    <p>风雨桥以长方体廊桥为主体，搭配对称桥亭，体现侗族建筑智慧，平衡、稳固、富有韵律。</p>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function back(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
}
</script>
</body>
</html>
